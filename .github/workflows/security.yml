name: Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 06:00 UTC

jobs:
  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Bandit
        run: pip install bandit[toml]
      - name: Run Bandit
        run: bandit -r . -c .bandit --format json --output bandit-report.json || true
      - name: Print summary
        run: bandit -r . -c .bandit --format screen
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  safety:
    name: Safety (Dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Safety
        run: pip install safety
      - name: Check dependencies
        run: safety check -r requirements.txt --output json > safety-report.json || true
      - name: Print summary
        run: safety check -r requirements.txt || true
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safety-report
          path: safety-report.json

  npm-audit:
    name: npm audit (Frontend CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Run npm audit
        run: cd frontend && npm audit --json > ../npm-audit-report.json || true
      - name: Print summary
        run: cd frontend && npm audit || true
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json

  trivy:
    name: Trivy (Docker Image CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t aletheia:scan .
      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy
      - name: Scan image (fail on CRITICAL)
        run: trivy image --exit-code 1 --severity CRITICAL aletheia:scan
      - name: Scan image (warn on HIGH)
        run: trivy image --exit-code 0 --severity HIGH aletheia:scan
      - name: Full report (JSON)
        if: always()
        run: trivy image --format json --output trivy-report.json aletheia:scan
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
