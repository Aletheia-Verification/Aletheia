# Alembic Configuration — Aletheia Beyond Database Migrations
# ============================================================
#
# Run migrations:
#   alembic upgrade head
#
# Generate new migration:
#   alembic revision --autogenerate -m "description"
#
# Rollback:
#   alembic downgrade -1

[alembic]
# Path to migration scripts
script_location = alembic

# Template used for new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Prepend sys.path for module imports
prepend_sys_path = .

# Timezone for migration timestamps
timezone = UTC

# Truncate revision ids to 8 chars
truncate_slug_length = 40

# Version path separator (for branched migrations)
version_path_separator = os

# Output encoding
output_encoding = utf-8

# SQLAlchemy URL - overridden by env.py from DATABASE_URL env var
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# No post-write hooks configured


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
